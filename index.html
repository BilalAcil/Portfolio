<!DOCTYPE html>
<html lang="en" data-lang="en" translate="no">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilal Acil • Fullstack Developer</title>
  <link rel="icon" type="image/png" href="assets/images/Bilal_Acil_Titel.png">
  <link rel="stylesheet" href="styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <!-- ===== HERO ===== -->
  <section class="hero" id="home">
    <div class="hero-content">
      <!-- Photo -->
      <div class="hero-photo">
        <div class="background"> <img src="./assets/images/BG shape.png" alt=""> </div>
        <div class="photo-oval">
          <div>
            <img class="profile-img" src="assets/images/Bilal_Acil.png" alt="Bilal Acil">
          </div>
        </div>
      </div>
      <!-- Text -->
      <div class="hero-text">
        <div class="hero-logo">
          <div class="logo-container">
            <div class="logo-label">
              <img src="assets/images/Bilal_Logo.png" alt="B.Acil Logo" class="hero-logo-icon">
              <span class="hero-logo-label">
                <span class="label-front">B.Acil</span>
                <span class="label-back">Developer</span>
              </span>
            </div>
            <!-- Social icons -->
            <div class="social-icons">
              <div class="s-icons">
                <a href="mailto:kontakt@bilal-acil.de" class="social-icon mail" aria-label="Email">
                  <img class="rectangle-185" src="./assets/icons/Rectangle 185.png" alt="Email">
                  <div class="vector-32"><img src="./assets/icons/Vector 32.png" style="position: absolute;"></div>
                </a>
                <a href="https://github.com/BilalAcil" target="_blank" class="social-icon" aria-label="GitHub">
                  <div class="github-elipse"></div>
                  <div class="github-button"></div>
                </a>
                <a href="https://www.linkedin.com/in/bilal-acil" target="_blank" class="social-icon"
                  aria-label="LinkedIn">
                  <div class="linkedin-elipse"></div>
                  <div class="linkedin-button"></div>
                </a>
              </div>
            </div>
          </div>
          <div>
            <h1 class="hero-name">BILAL ACIL</h1>
            <div>
              <h2 class="hero-title" data-de="FULLSTACK DEVELOPER" data-en="FULLSTACK DEVELOPER"></h2>
            </div>
          </div>
          <div class="scroll-indicator">
            <img src="./assets/icons/Arrow down.png" alt="Scroll down">
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="nav-logo-icon" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><img
            src="./assets/images/Bilal_Logo_3.png" alt=""></span>
        <span class="nav-logo-text">B.Acil</span>
      </div>

      <ul class="nav-links">
        <li><a href="#why-me" data-de="Über mich" data-en="Why me"></a></li>
        <li><a href="#skills" data-de="Skills" data-en="Skills"></a></li>
        <li><a href="#projects" data-de="Projekte" data-en="Projects"></a></li>
        <li><a href="#contact" data-de="Kontakt" data-en="Contact"></a></li>
      </ul>

      <div class="lang-switcher">
        <button class="lang-btn" id="lang-de">
          <div>DE</div>
        </button>
        <button class="lang-btn active" id="lang-en">
          <div>EN</div>
        </button>
      </div>
    </div>
  </nav>

  <section class="why-me">
    <div class="why-me-container">
      <h3 data-de="Über mich" data-en="Why me"></h3>
      <div class="why-me-info">
        <div class="location">
          <img id="location-icon" src="assets/images/Bilal_Acil_Titel.png" alt="">
          <div class="location-text">
            <span>Bilal Acil</span>
          </div>
        </div>
        <div class="why-me-text">
          <p data-de="Ich verbinde sauberen Code mit modernem Design und einem klaren Fokus auf den Nutzer. Mein Ziel ist es, nicht nur funktionierende, sondern wirklich durchdachte Lösungen zu entwickeln."
            data-en="I combine clean code with modern design and a strong focus on the user. My goal is not just to build working solutions, but truly thoughtful ones.">
          </p>
          <div class="talk-button-container">
            <img src="./assets/icons/Lets talk button.png
            " alt="">
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="my-skills">
    <div class="my-skills-container">
      <h3>My Skills</h3>
      <div class="my-skills-left-right">
        <div class="my-skills-left">
          <div class="skills-group">
            <span class="skills-label">MASTERED</span>
            <div class="icon-conatainer">
              <div class="mastered"><img src="./assets/icons/skill icons/HTML Icon.png" alt="HTML"></div>
              <div class="mastered"><img src="./assets/icons/skill icons/CSS Icon.png" alt="CSS"></div>
              <div class="mastered"><img src="./assets/icons/skill icons/JavaScript Icon.png" alt="JS"></div>
              <div class="mastered"><img src="./assets/icons/skill icons/Git Icon.png" alt="Git"></div>
            </div>
          </div>
          <div class="skills-group">
            <span class="skills-label planned-label">PLANNED</span>
            <div class="icon-conatainer">
              <div class="opacity"><img src="./assets/icons/skill icons/TypeScript.png" alt="TypeScript"></div>
              <div class="opacity"><img src="./assets/icons/skill icons/Angular.png" alt="Angular"></div>
              <div class="opacity"><img src="./assets/icons/skill icons/Supabase.png" alt="Supabase"></div>
              <div class="opacity"><img src="./assets/icons/skill icons/Rest-Api.png" alt="Claude"></div>
            </div>
            <div class="icon-conatainer">
              <div class="opacity"><img src="./assets/icons/skill icons/Material-Design.png" alt="Rest-Api"></div>
              <div class="opacity"><img src="./assets/icons/skill icons/Vue.js.png" alt="Material-Design"></div>
              <div class="opacity"><img src="./assets/icons/skill icons/React.png" alt="n8n"></div>
              <div class="opacity"><img src="./assets/icons/skill icons/Scrum.png" alt="Scrum"></div>
            </div>
          </div>
        </div>
        <div class="my-skills-right">
          <div class="skills-ellipse-bg"></div>
          <div class="skills-ellipse-content">
            <p class="skills-motivation"
              data-de="Ich komme aus einer völlig anderen Branche — aber Webentwicklung ist das erste, was mich wirklich begeistert. Ich liebe es, tief einzutauchen, Dinge zu bauen die zählen, und immer an der Spitze der KI zu bleiben. Das ist kein Karrierewechsel. Das ist wo ich hingehöre."
              data-en="I come from a completely different field — but web development is the first thing that truly excites me. I love diving deep, building things that matter, and staying on the cutting edge of AI. This is not just a career change. It's where I belong.">
            </p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== PROJECTS ===== -->
  <section class="my-projects" id="projects">
    <div class="projects-container">
      <h3 data-de="Projekte" data-en="My Projects"></h3>
      <div class="project-tabs-container">
        <div class="project-tabs" id="project-tabs"></div>
      </div>
      <div class="project-panels" id="project-panels"></div>
    </div>
  </section>

  <!-- ===== REFERENCES ===== -->
  <section class="references" id="references">
    <div class="references-container">
      <h3 data-de="Brauchst du einen Teamplayer? Das sagen meine Kollegen über mich"
        data-en="Need a teamplayer? Here's what my colleagues say about me"></h3>
      <div class="references-cards">

        <div class="reference-card">
          <p class="ref-name">Stefan Helldobler</p>
          <p class="ref-project"><span data-de="Projekt" data-en="Project"></span> <span
              class="project-name">Join</span>
          </p>
          <p class="ref-quote"
            data-de='"Bilal hat nicht nur seine eigenen Aufgaben zuverlässig erledigt, sondern auch das Team im Blick behalten und dort unterstützt, wo es nötig war."'
            data-en='"Bilal didn&#39;t just reliably handle his own tasks — he also kept an eye on the team and stepped in wherever support was needed."'>
          </p>
          <a href="https://www.linkedin.com/in/stefan-helldobler-b51386388" target="_blank" class="ref-linkedin"
            data-de="LinkedIn Profil" data-en="LinkedIn Profile"></a>
        </div>

        <div class="reference-card">
          <p class="ref-name">Leon König</p>
          <p class="ref-project"><span data-de="Projekt" data-en="Project"></span> <span
              class="project-name">Join</span>
          </p>
          <p class="ref-quote"
            data-de='"Sorgte für klare Transparenz im Teamfortschritt und hat Probleme früh erkannt und gelöst."'
            data-en='"He ensured clear transparency in team progress and identified and resolved issues early on."'></p>
          <a href="https://www.linkedin.com/in/leon-könig-577710388" target="_blank" class="ref-linkedin"
            data-de="LinkedIn Profil" data-en="LinkedIn Profile"></a>
        </div>

        <div class="reference-card">
          <p class="ref-name">Steven Bracke</p>
          <p class="ref-project"><span data-de="Projekt" data-en="Project"></span> <span
              class="project-name">Join</span>
          </p>
          <p class="ref-quote"
            data-de='"Die Kommunikation mit Bilal war top: klar, direkt und immer auf den Punkt. Das hat das Team wirklich vorangebracht."'
            data-en='"Communication with Bilal was excellent: clear, direct and always to the point. That really moved the team forward."'>
          </p>
          <a href="https://www.linkedin.com/in/steven-bracke-3594a822b" target="_blank" class="ref-linkedin"
            data-de="LinkedIn Profil" data-en="LinkedIn Profile"></a>
        </div>

      </div>
    </div>
  </section>


  <!-- ===== CONTACT ===== -->
  <section class="contact" id="contact">
    <div class="contact-container">
      <h3 data-de="Kontaktiere mich" data-en="Contact me"></h3>
      <div class="contact-top">
        <p class="contact-intro"
          data-de="Auf der Suche nach spannenden Herausforderungen, Projekten oder neuen Chancen. Ich freue mich über Nachrichten zu Vollzeit-, Teilzeit- oder Freelance-Positionen."
          data-en="Seeking exciting challenges, projects, and new opportunities. I welcome messages regarding full-time, part-time, or freelance positions">
        </p>
        <div class="contact-info">
          <div class="contact-info-item" style="cursor: pointer;">
            <div class="contact-mail-icon">
              <img src="./assets/icons/mail-1.png" alt="" class="mail-default">
              <img src="./assets/icons/mail-2.png" alt="" class="mail-hover">
            </div>
            <span>bilal-acil@web.de</span>
          </div>
          <div class="contact-info-item" style="cursor: default;">
            <div class="contact-info-icon contact-phone-icon"></div>
            <span data-de="Tel: auf Anfrage" data-en="Tel: on request"></span>
          </div>
        </div>
      </div>
      <form class="contact-form" id="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label data-de="Dein Name" data-en="Your name"></label>
            <input type="text" name="name" required>
          </div>
          <div class="form-group">
            <label data-de="Deine E-Mail" data-en="Your Email"></label>
            <input type="email" name="email" required>
          </div>
        </div>
        <div class="form-group">
          <label data-de="Deine Nachricht" data-en="Your Message"></label>
          <textarea name="message" rows="6" required></textarea>
        </div>
        <div class="form-footer">
          <div class="form-checkbox">
            <input type="checkbox" id="privacy" required>
            <label for="privacy">
              <span data-de="Ich habe die " data-en="I've read the "></span><a href="#" class="privacy-link"
                data-de="Datenschutzerklärung" data-en="privacy policy"></a><span
                data-de=" gelesen und stimme der Verarbeitung meiner Daten zu."
                data-en=" and agree to the processing of my data as outlined."></span>
            </label>
          </div>
          <button type="submit" class="btn-send" data-de="Senden" data-en="Send"></button>
        </div>
      </form>
    </div>
    <button class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
      <span>↑</span>
    </button>
  </section>

  <script src="script.js"></script>
</body>

</html>
